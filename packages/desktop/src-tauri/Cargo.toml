[package]
name = "git-reviewer-desktop"
version = "0.1.0"
description = "Git Reviewer desktop app"
authors = []
edition = "2021"

[lib]
name = "git_reviewer_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "git-reviewer-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["blocking"] }
