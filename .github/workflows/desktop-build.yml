name: Desktop Build

on:
  push:
    branches: [main]

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            artifact-name: git-reviewer-macos
            artifact-paths: |
              packages/desktop/src-tauri/target/release/bundle/dmg/*.dmg
              packages/desktop/src-tauri/target/release/bundle/macos/*.app
          - name: Linux
            os: ubuntu-22.04
            artifact-name: git-reviewer-linux
            artifact-paths: |
              packages/desktop/src-tauri/target/release/bundle/deb/*.deb
              packages/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          - name: Windows
            os: windows-latest
            artifact-name: git-reviewer-windows
            artifact-paths: |
              packages/desktop/src-tauri/target/release/bundle/msi/*.msi
              packages/desktop/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Build web frontend
        run: pnpm build

      - name: Build Tauri desktop app
        working-directory: packages/desktop
        run: pnpm exec tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact-name }}
          path: ${{ matrix.platform.artifact-paths }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(jq -r '.version' packages/desktop/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}-build.${{ github.run_number }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Git Reviewer ${{ steps.version.outputs.version }} (build ${{ github.run_number }})" \
            --generate-notes \
            artifacts/**/*
